<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../dist/output.css" />
    <!--Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
      rel="stylesheet"
    />
    <title>Document</title>
  </head>
  <body class="font-poppins">
    <header class="flex justify-between text-xl bg-red-400 text-white">
      <a href="#" class="p-5 text-3xl">MovieApp</a>
      <nav class="p-5">
        <a href="#" class="p-3">Home</a>
        <a href="#" class="p-3">Favorites</a>
      </nav>
    </header>
    <section id="search-container" class="max-w-6xl m-auto h-72 flex">
      <div class="m-auto w-3/5 relative">
        <input
          type="text"
          name="search"
          id="search-bar"
          class="border-2 border-red-400 w-full relative p-2 rounded"
          placeholder="Search a movie"
        />
        <svg
          class="absolute inline-block right-0 cursor-pointer h-full mr-2"
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#F87171"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </div>
    </section>
    <section id="movies-section" class="max-w-6xl m-auto">
      <div class="" id="trending-movies-container">
        <h1 class="mb-5 text-xl font-bold">Trending</h1>
        <div class="grid grid-cols-4" id="trending-movies"></div>
      </div>
    </section>
    <script src="./app.js"></script>
  </body>
</html>
