<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../dist/output.css" />
    <!-- GlideJS -->
    <link
      rel="stylesheet"
      href="../node_modules/@glidejs/glide/dist/css/glide.core.min.css"
    />
    <link
      rel="stylesheet"
      href="../node_modules/@glidejs/glide/dist/css/glide.theme.min.css"
    />
    <!--Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins&display=swap"
      rel="stylesheet"
    />
    <title>Document</title>
  </head>
  <body class="font-poppins">
    <header class="flex justify-between text-xl bg-red-400 text-white">
      <a href="#" class="p-5 text-3xl">MovieApp</a>
      <nav class="p-5">
        <a href="#" class="p-3">Home</a>
        <a href="#" class="p-3">Favorites</a>
      </nav>
    </header>
    <section id="search-container" class="max-w-6xl m-auto h-72 flex">
      <div class="m-auto w-3/5 relative text-center">
        <input
          type="text"
          name="search"
          id="search-bar"
          class="border-2 border-red-400 w-full relative p-2 rounded"
          placeholder="Search a movie"
        />
        <svg
          class="absolute inline-block right-0 cursor-pointer h-full mr-2"
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="#F87171"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </div>
    </section>
    <section id="movies-section" class="max-w-6xl m-auto">
      <div
        class="trending-movies-container p-15"
        id="trending-movies-container"
      >
        <h1 class="mb-5 text-xl font-bold">Trending</h1>
        <div
          id="trending-glide-container"
          class="flex justify-center items-center p-15"
        >
          <div class="glide" id="trending-movies">
            <div class="glide__track" data-glide-el="track">
              <ul class="glide__slides" id="trending-movies-list"></ul>
            </div>
            <div class="glide__arrows" data-glide-el="controls">
              <button
                class="glide__arrow glide__arrow--left"
                data-glide-dir="<"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#fff"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M19 12H6M12 5l-7 7 7 7" />
                </svg>
              </button>
              <button
                class="glide__arrow glide__arrow--right"
                data-glide-dir=">"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="#fff"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M5 12h13M12 5l7 7-7 7" />
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div id="latest-movie-container" class="h-96">
        <h1 class="mb-5 text-xl font-bold">Latest movie</h1>
        <div
          id="latest-card-container"
          class="w-full h-full cursor-pointer flex shadow-2xl"
        ></div>
      </div>

      <div class="mt-28">
        <h1 class="mb-5 text-xl font-bold">Random movies</h1>
        <div id="random-movies" class="flex justify-between"></div>
      </div>
    </section>
    <section id="footer" class="mt-28 bg-red-400 h-[150px]">
      <a href="#" class="text-3xl">MovieApp</a>
    </section>
    <script type="module" src="./app.js"></script>
  </body>
</html>
